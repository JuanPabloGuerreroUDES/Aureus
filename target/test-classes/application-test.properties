# ── Perfil de pruebas (U10 §4.4) ──────────────────────────────────────────────
# BD H2 separada de desarrollo para evitar afectar datos reales
spring.datasource.url=jdbc:h2:mem:aureustest;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deshabilitar DataInitializer en pruebas (perfil diferente)
spring.profiles.active=test

# Logging mínimo en pruebas
logging.level.root=WARN
logging.level.com.aureus=INFO
