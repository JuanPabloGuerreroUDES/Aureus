spring.application.name=Aureus
spring.profiles.active=dev

# ── Thymeleaf (reemplaza la configuración JSP anterior) ────────────────────────
# Thymeleaf busca plantillas en: src/main/resources/templates/
# Prefijo/sufijo configurados por Spring Boot automáticamente (.html)
# cache=false en desarrollo para ver cambios sin reiniciar
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── MySQL ──────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aureusdb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── Sesiones (U9 §6.2) ─────────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# ── JWT (U9 §7.4) ─────────────────────────────────────────────────────────────
app.jwt.secret=Aureus2026SecretKeyParaJWTDebeSerLargaYSegura!!XYZ123AbcDef456GhiJkl789
app.jwt.expiration-ms=86400000

# ── Swagger / OpenAPI (U11 §7.1) ───────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.paths-to-match=/api/**

# ── Error handling ─────────────────────────────────────────────────────────────
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-exception=false
