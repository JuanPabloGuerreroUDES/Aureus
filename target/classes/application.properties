spring.application.name=Aureus
spring.profiles.active=dev

# ── MVC / JSP ──────────────────────────────────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.static-path-pattern=/static/**
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# ── JPA / Hibernate (U8 §2.2) ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── MySQL ──────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aureusdb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── Sesiones (U9 §6.2) ─────────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# ── JWT (U9 §7.4) ─────────────────────────────────────────────────────────────
# ADVERTENCIA: mover a variable de entorno en producción
app.jwt.secret=Aureus2026SecretKeyParaJWTDebeSerLargaYSegura!!XYZ123AbcDef456GhiJkl789
app.jwt.expiration-ms=86400000

# ── Swagger / OpenAPI (U11 §7.1) ───────────────────────────────────────────────
# Swagger UI interactivo:  http://localhost:8080/swagger-ui.html
# JSON OpenAPI spec:       http://localhost:8080/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.default-models-expand-depth=2
# Solo documentar endpoints REST (/api/**)
springdoc.paths-to-match=/api/**

# ── Error handling ─────────────────────────────────────────────────────────────
# Desactiva la Whitelabel Error Page de Spring Boot.
# Los errores van al GlobalExceptionHandler → error/error.jsp
server.error.whitelabel.enabled=false
# Incluir mensaje de excepción en la respuesta de error (desarrollo)
server.error.include-message=always
server.error.include-exception=false
