spring.application.name=Aureus
spring.profiles.active=dev

# ── MVC / JSP ──────────────────────────────────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.static-path-pattern=/static/**
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# update: mantiene la estructura y solo actualiza cambios (no borra datos)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── MySQL (dev) ────────────────────────────────────────────────────────────────
# Asegúrate de que la base de datos "aureusdb" exista en MySQL antes de iniciar.
# En MySQL Workbench o terminal ejecuta: CREATE DATABASE aureusdb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/aureusdb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── Sesiones ──────────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=Aureus2026SecretKeyParaJWTDebeSerLargaYSegura!!XYZ123
app.jwt.expiration-ms=86400000
