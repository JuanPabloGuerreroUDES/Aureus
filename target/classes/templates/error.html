<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Aureus — Error ${status ?: codigo ?: ''}|">Aureus — Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body{background:#0D0F14;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .error-code{font-size:7rem;font-weight:800;color:#C8F135;line-height:1}
        .error-title{font-size:1.5rem;font-weight:700;color:#fff}
        .error-msg{color:rgba(255,255,255,0.5);font-size:.95rem;max-width:420px}
        .btn-home{background:#C8F135;color:#0D0F14;border-radius:8px;padding:.65rem 1.8rem;font-weight:700;font-size:.95rem;text-decoration:none}
        .btn-home:hover{opacity:.9;color:#0D0F14}
        .logo{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:3rem}
        .logo span{color:#C8F135}
    </style>
</head>
<body>
    <a class="logo" href="/dashboard" style="text-decoration:none">Au<span>reus</span></a>
    <div class="text-center px-3">
        <div class="error-code">
            <!--
              Aquí usamos 'status' (expuesto por Spring Boot ErrorAttributes)
              o 'codigo' si vino del GlobalExceptionHandler.
            -->
            <th:block th:if="${codigo}" th:text="${codigo}"></th:block>
            <th:block th:unless="${codigo}" th:if="${status}" th:text="${status}"></th:block>
            <i th:unless="${codigo or status}" class="bi bi-exclamation-triangle" style="font-size:5rem"></i>
        </div>
        <div class="error-title mt-3"
             th:text="${titulo ?: error ?: 'Algo salió mal'}">Error</div>
        <div class="error-msg mt-2 mb-4 mx-auto"
             th:text="${mensaje ?: message ?: 'Ha ocurrido un error inesperado. Inténtalo de nuevo más tarde.'}">Error</div>
        <div class="d-flex gap-3 justify-content-center">
            <a href="/dashboard" class="btn-home"><i class="bi bi-house-fill me-2"></i>Ir al inicio</a>
            <button onclick="history.back()" class="btn text-white"
                    style="border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:.65rem 1.4rem">
                <i class="bi bi-arrow-left me-2"></i>Volver
            </button>
        </div>
    </div>
</body>
</html>
