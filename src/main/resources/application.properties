spring.application.name=Aureus
spring.profiles.active=dev

# ── MVC / JSP ──────────────────────────────────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.static-path-pattern=/static/**
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# ── JPA / Hibernate (U8 §2.2) ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── MySQL ──────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aureusdb?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ── Sesiones (U9 §6.2) ─────────────────────────────────────────────────────────
server.servlet.session.timeout=30m
# HttpOnly=true → JavaScript no puede acceder a la cookie (mitiga robo de sesión via XSS — U9 §2.1)
server.servlet.session.cookie.http-only=true
# Secure=true en producción con HTTPS — evita transmisión de cookie en HTTP plano
# Cambiar a true cuando se despliegue con HTTPS (U9 §6.3 — Strict-Transport-Security)
server.servlet.session.cookie.secure=false
# SameSite=Lax — mitiga ataques CSRF (U9 §2.2)
server.servlet.session.cookie.same-site=lax

# ── JWT (U9 §7.4) ─────────────────────────────────────────────────────────────
# ADVERTENCIA DE SEGURIDAD: en producción, mover este secreto a una variable de
# entorno o a un gestor de secretos (HashiCorp Vault, AWS Secrets Manager).
# Nunca commitear la clave real al repositorio de código fuente.
# La clave debe tener al menos 64 caracteres (512 bits) para HMAC-SHA256 seguro.
app.jwt.secret=Aureus2026SecretKeyParaJWTDebeSerLargaYSegura!!XYZ123AbcDef456GhiJkl789
app.jwt.expiration-ms=86400000
