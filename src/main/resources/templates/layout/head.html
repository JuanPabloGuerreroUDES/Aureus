<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Fragmento <head> común a todas las páginas internas.
  Uso: <head th:replace="~{layout/head :: head('Título')}"></head>
  th:text escapa automáticamente — protección XSS (U9 §2.1).
-->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="|Aureus — ${pageTitle}|">Aureus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root{--au-lime:#C8F135;--au-ink:#0D0F14;--au-teal:#1A9E8C;--au-coral:#F25C3A;--au-gold:#E8A912;--au-muted:#6E7080;--sidebar-w:240px}
        body{background:#F5F2EC;font-family:'Segoe UI',sans-serif}
        .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--au-ink);position:fixed;top:0;left:0;z-index:100;display:flex;flex-direction:column}
        .sidebar .logo{font-size:1.3rem;font-weight:800;padding:1.2rem 1.4rem;border-bottom:1px solid rgba(255,255,255,0.08);color:#fff;text-decoration:none}
        .sidebar .logo span{color:var(--au-lime)}
        .sidebar .nav-section{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:.9rem 1.2rem .3rem}
        .sidebar .nav-link{color:rgba(255,255,255,0.5);font-size:.875rem;padding:.55rem 1.2rem;border-left:3px solid transparent;border-radius:0 8px 8px 0;margin:1px 8px 1px 0;display:flex;align-items:center;gap:.6rem}
        .sidebar .nav-link:hover{color:#fff;background:rgba(255,255,255,0.05)}
        .sidebar .nav-link.active{color:var(--au-lime);border-left-color:var(--au-lime);background:rgba(200,241,53,0.08)}
        .sidebar .user-card{margin-top:auto;padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:.8rem}
        .sidebar .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--au-lime);color:var(--au-ink);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
        .main-content{margin-left:var(--sidebar-w);padding:1.8rem 2rem}
        .kpi-card{background:#fff;border-radius:12px;padding:1.2rem;border:1px solid #E8E5DF}
        .kpi-card.lime{background:var(--au-lime);border-color:#9DC41A}
        .kpi-card.teal{background:var(--au-teal);color:#fff;border-color:var(--au-teal)}
        .kpi-value{font-size:1.6rem;font-weight:700;line-height:1}
        .kpi-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:.4rem}
        .progress-ok .progress-bar{background:var(--au-teal)}
        .progress-warn .progress-bar{background:var(--au-gold)}
        .progress-over .progress-bar{background:var(--au-coral)}
        .badge-income{background:#E0F5F2;color:var(--au-teal)}
        .badge-expense{background:#FEE9E4;color:var(--au-coral)}
        .table-aureus th{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--au-muted);background:#F5F2EC}
        .table-aureus td{vertical-align:middle;font-size:.875rem}
        .btn-logout{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.12);border-radius:8px;font-size:.8rem;font-weight:600;padding:.45rem .8rem;text-align:left;transition:background .18s,color .18s}
        .btn-logout:hover{background:var(--au-coral);color:#fff;border-color:var(--au-coral)}
    </style>
</head>
</html>
