<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Fragmento de cierre: scripts Bootstrap + helper CSRF para fetch/AJAX.
  Uso: <div th:replace="~{layout/footer :: footer}"></div>
-->
<div th:fragment="footer">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
    /*
     * getCsrfToken(): devuelve el token CSRF para usarlo en peticiones AJAX.
     * Spring Security requiere el token en POST/PUT/DELETE (U9 §6.1).
     *
     * NOTA: th:inline="javascript" permite acceder a variables del modelo de
     * Thymeleaf dentro de bloques script con la notacion de corchetes dobles.
     */
    function getCsrfToken() {
        return {
            token:     /*[[${_csrf.token}]]*/ '',
            paramName: /*[[${_csrf.parameterName}]]*/ '_csrf'
        };
    }

    async function fetchWithCsrf(url, options = {}) {
        const csrf = getCsrfToken();
        return fetch(url, {
            ...options,
            headers: { 'Content-Type': 'application/json', [csrf.paramName]: csrf.token, ...options.headers }
        });
    }

    // Auto-ocultar alertas después de 5 segundos
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.alert.alert-dismissible').forEach(a => {
            setTimeout(() => bootstrap.Alert.getOrCreateInstance(a).close(), 5000);
        });
        // Preseleccionar fecha de hoy en inputs de fecha sin valor
        document.querySelectorAll('input[type="date"]:not([value])').forEach(f => {
            if (!f.value) f.value = new Date().toISOString().split('T')[0];
        });
    });
    </script>
</div>
</html>
