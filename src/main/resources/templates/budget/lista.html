<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{layout/head :: head('Presupuestos')}"></head>
<body>
<aside th:replace="~{layout/sidebar :: sidebar('presupuestos')}"></aside>
<div class="main-content">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h3 class="fw-bold mb-0">Presupuestos</h3><p class="text-muted mb-0" style="font-size:.85rem">Controla tus límites de gasto por categoría</p></div>
        <button class="btn btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevo"
                style="background:#0D0F14;color:#C8F135;font-weight:600;border-radius:8px;padding:.5rem 1rem">
            <i class="bi bi-plus-lg"></i> Nuevo presupuesto
        </button>
    </div>

    <!-- Selector de cuenta -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:12px">
        <div class="card-body py-3">
            <form method="get" action="/presupuestos" class="d-flex gap-2 align-items-center">
                <label class="form-label mb-0 me-1" style="font-size:.85rem;white-space:nowrap"><i class="bi bi-bank2 me-1"></i>Ver presupuestos de:</label>
                <select name="cuentaId" class="form-select form-select-sm" style="width:auto" onchange="this.form.submit()">
                    <option th:each="c : ${cuentas}" th:value="${c.id}"
                            th:selected="${c.id == cuentaSeleccionada}"
                            th:text="${c.name}"></option>
                </select>
            </form>
        </div>
    </div>

    <!-- Lista de presupuestos -->
    <div th:if="${#lists.isEmpty(presupuestos)}" class="text-center py-5 text-muted">
        <i class="bi bi-pie-chart" style="font-size:3rem;color:#ccc"></i>
        <p class="mt-3">No tienes presupuestos para esta cuenta.<br>Crea uno para controlar tus gastos.</p>
        <button class="btn mt-1" data-bs-toggle="modal" data-bs-target="#modalNuevo"
                style="background:#0D0F14;color:#C8F135;border-radius:8px">
            <i class="bi bi-plus-lg"></i> Crear presupuesto
        </button>
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(presupuestos)}">
        <div class="col-md-6 col-lg-4" th:each="p, loop : ${presupuestos}">
            <!--
              th:with crea una variable local 'pct' para el porcentaje.
              Equivalente a <c:set var="pct" value="${porcentajesUso[loop.index]}"/>
            -->
            <div th:with="pct=${porcentajesUso[loop.index]}" class="card border-0 shadow-sm h-100" style="border-radius:16px">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge" style="background:#EDE9DF;color:#0D0F14;font-size:.75rem"
                              th:text="${p.category.name}">Categoría</span>
                        <form th:action="@{/presupuestos/{id}/eliminar(id=${p.id})}" method="post"
                              style="display:inline" onsubmit="return confirm('¿Eliminar este presupuesto?')">
                            <input type="hidden" name="cuentaId" th:value="${cuentaSeleccionada}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger border-0">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                    <div class="fw-bold mb-1" th:text="${'Límite: $' + #numbers.formatDecimal(p.limitAmount, 1, 'COMMA', 2, 'POINT')}">Límite: $0</div>
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span style="font-size:.75rem;color:#6E7080">Uso</span>
                        <span class="fw-bold" style="font-size:.85rem"
                              th:style="${pct >= 100 ? 'color:#F25C3A' : (pct >= 80 ? 'color:#E8A912' : 'color:#1A9E8C')}"
                              th:text="${#numbers.formatDecimal(pct, 1, 'POINT', 1, 'COMMA') + '%'}">0%</span>
                    </div>
                    <div class="progress" style="height:6px;border-radius:100px;margin-bottom:.6rem"
                         th:class="${pct >= 100 ? 'progress progress-over' : (pct >= 80 ? 'progress progress-warn' : 'progress progress-ok')}">
                        <div class="progress-bar"
                             th:style="${'width:' + (pct > 100 ? 100 : pct) + '%'}"></div>
                    </div>
                    <div th:if="${pct >= 80}" class="alert alert-warning py-1 px-2 mb-2" style="font-size:.75rem;border-radius:8px">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                        <span th:text="${pct >= 100 ? '¡Límite superado!' : 'Cerca del límite'}"></span>
                    </div>
                    <div class="text-muted" style="font-size:.78rem">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${p.startDate + ' — ' + p.endDate}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal nuevo presupuesto -->
    <div class="modal fade" id="modalNuevo" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content" style="border-radius:16px">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Nuevo presupuesto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/presupuestos/nuevo}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:.85rem">Cuenta</label>
                        <select name="accountId" class="form-select" required>
                            <option value="" disabled="disabled" selected="selected">— Seleccionar —</option>
                            <option th:each="c : ${cuentas}" th:value="${c.id}"
                                    th:selected="${c.id == cuentaSeleccionada}"
                                    th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="font-size:.85rem">Categoría</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="" disabled="disabled" selected="selected">— Seleccionar —</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label fw-semibold" style="font-size:.85rem">Límite ($)</label><input type="number" name="limitAmount" class="form-control" step="0.01" min="0.01" required placeholder="0.00"/></div>
                    <div class="row g-2 mb-3">
                        <div class="col"><label class="form-label fw-semibold" style="font-size:.85rem">Desde</label><input type="date" name="startDate" class="form-control" required/></div>
                        <div class="col"><label class="form-label fw-semibold" style="font-size:.85rem">Hasta</label><input type="date" name="endDate" class="form-control" required/></div>
                    </div>
                    <div class="mb-3"><label class="form-label fw-semibold" style="font-size:.85rem">Alerta al (%)</label><input type="number" name="umbralAlerta" class="form-control" value="80" min="1" max="100"/></div>
                    <div class="d-grid">
                        <button type="submit" class="btn fw-bold" style="background:#0D0F14;color:#C8F135;border-radius:8px">Crear presupuesto</button>
                    </div>
                </form>
            </div>
        </div></div>
    </div>

<div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
