<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{layout/head :: head('Solicitudes — Admin')}"></head>
<body>
<aside th:replace="~{layout/sidebar :: sidebar('admin')}"></aside>
<div class="main-content">

    <div class="mb-4">
        <h3 class="fw-bold mb-1">Panel de Control · Solicitudes</h3>
        <p class="text-muted" style="font-size:.82rem">
            Acceso exclusivo para administradores del sistema.
        </p>
    </div>

    <!-- ── KPIs en dark card ── -->
    <div class="card border-0 mb-4" style="background:#0D0F14;border-radius:18px;padding:1.5rem 2rem">
        <div class="row g-4 text-center">
            <div class="col-6 col-md-3">
                <div style="font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em">Total</div>
                <div style="font-size:2.2rem;font-weight:800;color:#C8F135" th:text="${resumen['total']}">0</div>
            </div>
            <div class="col-6 col-md-3">
                <div style="font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em">Pendientes</div>
                <div style="font-size:2.2rem;font-weight:800;color:#FFC107" th:text="${resumen['pendientes']}">0</div>
            </div>
            <div class="col-6 col-md-3">
                <div style="font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em">Aprobadas</div>
                <div style="font-size:2.2rem;font-weight:800;color:#4ECDC4" th:text="${resumen['aprobadas']}">0</div>
            </div>
            <div class="col-6 col-md-3">
                <div style="font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em">Rechazadas</div>
                <div style="font-size:2.2rem;font-weight:800;color:#F25C3A" th:text="${resumen['rechazadas']}">0</div>
            </div>
        </div>
    </div>

    <!-- ── Tabla ── -->
    <div class="card border-0 shadow-sm" style="border-radius:12px">
        <div class="card-body p-0">
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0">Todas las solicitudes</h6>
                <small class="text-muted" th:text="'Total: ' + ${resumen['total']}">Total: 0</small>
            </div>
            <div class="table-responsive">
                <table class="table table-aureus table-hover mb-0">
                    <thead style="background:#F5F4F0">
                        <tr>
                            <th class="ps-3" style="font-size:.75rem">Solicitante</th>
                            <th style="font-size:.75rem">Tipo</th>
                            <th style="font-size:.75rem">Estado</th>
                            <th style="font-size:.75rem">Apertura</th>
                            <th style="font-size:.75rem">Nota</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(solicitudes)}">
                            <td colspan="5" class="text-center text-muted py-5" style="font-size:.85rem">
                                <i class="bi bi-clipboard2-x fs-2 d-block mb-2"></i>
                                No hay solicitudes registradas.
                            </td>
                        </tr>
                        <tr th:each="s : ${solicitudes}">
                            <td class="ps-3">
                                <div style="font-size:.875rem;font-weight:500" th:text="${s.creadorNombre}">—</div>
                                <div style="font-size:.72rem;color:#6E7080" th:text="${s.creadorEmail}">—</div>
                            </td>
                            <td>
                                <span style="font-size:.72rem;font-weight:600;padding:.25rem .65rem;border-radius:6px"
                                      th:text="${s.tipo}"
                                      th:style="${s.tipo == 'SOPORTE'    ? 'background:#EDE9DF;color:#6B4C00' :
                                                  s.tipo == 'ACCESO'     ? 'background:#E0F2FE;color:#0369A1' :
                                                                            'background:#F0FDF4;color:#166534'}">—</span>
                            </td>
                            <td>
                                <!-- Diferenciación visual por estado mediante íconos + color de texto -->
                                <span th:if="${s.estado == 'PENDIENTE'}"
                                      style="font-size:.8rem;font-weight:600;color:#B45309">
                                    <i class="bi bi-hourglass-split me-1"></i>Pendiente
                                </span>
                                <span th:if="${s.estado == 'APROBADA'}"
                                      style="font-size:.8rem;font-weight:600;color:#047857">
                                    <i class="bi bi-check-circle-fill me-1"></i>Aprobada
                                </span>
                                <span th:if="${s.estado == 'RECHAZADA'}"
                                      style="font-size:.8rem;font-weight:600;color:#B91C1C">
                                    <i class="bi bi-x-circle-fill me-1"></i>Rechazada
                                </span>
                            </td>
                            <td style="font-size:.78rem;color:#6E7080"
                                th:text="${#temporals.format(s.abiertaEn, 'dd/MM/yyyy HH:mm')}">—</td>
                            <td style="font-size:.78rem;color:#6E7080;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
                                th:text="${s.nota ?: '—'}">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
