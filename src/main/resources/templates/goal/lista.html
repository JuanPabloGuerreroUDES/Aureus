<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{layout/head :: head('Metas de ahorro')}"></head>
<body>
<aside th:replace="~{layout/sidebar :: sidebar('metas')}"></aside>
<div class="main-content">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h3 class="fw-bold mb-0">Metas de ahorro</h3>
            <p class="text-muted mb-0" style="font-size:.85rem" th:text="${#lists.size(metas) + ' meta(s) activa(s)'}">0 metas</p>
        </div>
        <button class="btn btn-sm" data-bs-toggle="modal" data-bs-target="#modalNuevaMeta"
                style="background:#0D0F14;color:#C8F135;font-weight:600;border-radius:8px;padding:.5rem 1rem">
            <i class="bi bi-plus-lg"></i> Nueva meta
        </button>
    </div>

    <div class="row g-3">
        <div class="col-12" th:if="${#lists.isEmpty(metas)}">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-trophy fs-1 d-block mb-3" style="color:#C8F135"></i>
                <h5>Sin metas de ahorro aún</h5>
                <p style="font-size:.9rem">Crea tu primera meta y empieza a ahorrar con un objetivo claro.</p>
                <button class="btn" data-bs-toggle="modal" data-bs-target="#modalNuevaMeta"
                        style="background:#0D0F14;color:#C8F135;border-radius:8px">
                    <i class="bi bi-plus-lg"></i> Crear primera meta
                </button>
            </div>
        </div>

        <div class="col-md-4" th:each="meta : ${metas}">
            <div class="card border-0 shadow-sm h-100" style="border-radius:14px">
                <div class="card-body">
                    <span th:if="${meta.checkCompletion()}" class="badge mb-2"
                          style="background:#E0F5F2;color:#1A9E8C;border-radius:100px;font-size:.72rem">✓ COMPLETADA</span>
                    <span th:if="${meta.vencida}" class="badge mb-2"
                          style="background:#FEE9E4;color:#F25C3A;border-radius:100px;font-size:.72rem">⚠ VENCIDA</span>

                    <h6 class="fw-bold" th:text="${meta.goalName}">Meta</h6>
                    <div class="text-muted mb-3" style="font-size:.78rem" th:text="|Plazo: ${meta.deadline}|"></div>

                    <div class="fw-bold mb-1" style="font-size:1.5rem"
                         th:text="${#numbers.formatDecimal(meta.calculateProgress(), 1, 'POINT', 1, 'COMMA') + '%'}">0%</div>
                    <div class="progress mb-2" style="height:8px;border-radius:100px"
                         th:class="${meta.calculateProgress() >= 50 ? 'progress progress-ok' : 'progress progress-warn'}">
                        <div class="progress-bar" th:style="${'width:' + (meta.calculateProgress() > 100 ? 100 : meta.calculateProgress()) + '%'}"></div>
                    </div>
                    <div class="d-flex justify-content-between" style="font-size:.75rem;color:#6E7080">
                        <span th:text="${'$' + #numbers.formatInteger(meta.currentAmount, 1, 'COMMA') + ' ahorrado'}"></span>
                        <span th:text="${'Objetivo: $' + #numbers.formatInteger(meta.targetAmount, 1, 'COMMA')}"></span>
                    </div>

                    <div class="mt-3 d-flex gap-2" th:unless="${meta.checkCompletion()}">
                        <button class="btn btn-sm flex-grow-1"
                                style="background:#E0F5F2;color:#1A9E8C;border-radius:8px;font-size:.82rem"
                                th:attr="data-bs-toggle='modal', data-bs-target='#modalAporte' + ${meta.id}">
                            + Registrar aporte
                        </button>
                        <form th:action="@{/metas/{id}/eliminar(id=${meta.id})}" method="post"
                              onsubmit="return confirm('¿Eliminar esta meta?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger" style="border-radius:8px">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Modal de aporte -->
            <div class="modal fade" th:id="${'modalAporte' + meta.id}" tabindex="-1">
                <div class="modal-dialog modal-sm"><div class="modal-content" style="border-radius:14px;border:none">
                    <div class="modal-header border-0">
                        <h6 class="modal-title fw-bold">Aporte a "<span th:text="${meta.goalName}"></span>"</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body pt-0">
                        <form th:action="@{/metas/aporte}" method="post">
                            <input type="hidden" name="goalId" th:value="${meta.id}"/>
                            <label class="form-label" style="font-size:.82rem">Monto del aporte ($)</label>
                            <input type="number" name="aporte" class="form-control form-control-sm mb-3" step="0.01" min="0.01" required placeholder="0.00"/>
                            <button type="submit" class="btn w-100 fw-bold"
                                    style="background:#0D0F14;color:#C8F135;border-radius:8px;font-size:.9rem">
                                Registrar aporte
                            </button>
                        </form>
                    </div>
                </div></div>
            </div>
        </div>
    </div>

    <!-- Modal nueva meta -->
    <div class="modal fade" id="modalNuevaMeta" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content" style="border-radius:16px;border:none">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Nueva meta de ahorro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/metas/nueva}" method="post">
                    <div class="mb-3"><label class="form-label" style="font-size:.82rem">Nombre de la meta</label><input type="text" name="goalName" class="form-control" placeholder="Ej. Fondo de emergencia" required maxlength="150"/></div>
                    <div class="row g-2 mb-3">
                        <div class="col-6"><label class="form-label" style="font-size:.82rem">Monto objetivo ($)</label><input type="number" name="targetAmount" class="form-control" step="0.01" min="1" required placeholder="0.00"/></div>
                        <div class="col-6"><label class="form-label" style="font-size:.82rem">Fecha límite</label><input type="date" name="deadline" class="form-control" required/></div>
                    </div>
                    <button type="submit" class="btn w-100 fw-bold" style="background:#0D0F14;color:#C8F135;border-radius:8px">Crear meta</button>
                </form>
            </div>
        </div></div>
    </div>

<div th:replace="~{layout/footer :: footer}"></div>
</div>
</body>
</html>
